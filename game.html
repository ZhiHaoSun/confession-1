<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>记忆迷宫 — 专属于你的解谜冒险</title>
  <meta name="description" content="一场属于你们的记忆解谜之旅，在 2D 画面中寻找线索，解锁最深的告白。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Caveat:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background:
        radial-gradient(circle at 18% 12%, rgba(255, 232, 230, 0.95), transparent 34%),
        radial-gradient(circle at 82% 78%, rgba(242, 167, 122, 0.26), transparent 36%),
        linear-gradient(135deg, #fffaf6 0%, #fff4ed 45%, #ffe8e6 100%);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      min-height: 100vh;
      font-family: 'Noto Serif SC', serif;
      touch-action: manipulation;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      min-height: 100vh;
      position: relative;
      transition: transform 240ms ease, width 240ms ease, height 240ms ease;
    }
    #game-container canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
      border-radius: 0;
      box-shadow: none;
    }
    #mobile-game-controls {
      position: fixed;
      right: max(12px, env(safe-area-inset-right));
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 50;
      display: none;
      gap: 8px;
      align-items: center;
      pointer-events: none;
    }
    #mobile-game-controls button {
      pointer-events: auto;
      border: 1px solid rgba(216, 92, 114, 0.32);
      border-radius: 999px;
      padding: 10px 14px;
      background: rgba(255, 250, 246, 0.9);
      color: #4a2330;
      font: 600 13px 'Inter', 'Noto Serif SC', sans-serif;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(12px);
    }
    #exit-rotate-btn {
      display: none;
    }

    @media (max-width: 820px) and (orientation: portrait) {
      body {
        padding: 0;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
        max-width: none;
      }
      #mobile-game-controls {
        display: flex;
      }
      body.game-rotated {
        padding: 0;
      }
      body.game-rotated #game-container {
        position: fixed;
        left: 50%;
        top: 50%;
        width: 100vh;
        height: 100vw;
        max-width: none;
        transform: translate(-50%, -50%) rotate(90deg);
        transform-origin: center center;
      }
      body.game-rotated #game-container canvas {
        border-radius: 0;
      }
      body.game-rotated #rotate-game-btn {
        display: none;
      }
      body.game-rotated #exit-rotate-btn {
        display: inline-flex;
      }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="mobile-game-controls" aria-label="Mobile game controls">
    <button id="rotate-game-btn" type="button">横屏游玩</button>
    <button id="exit-rotate-btn" type="button">退出横屏</button>
  </div>
  <script type="module" src="/src/game/GameBoot.js"></script>
</body>
</html>
